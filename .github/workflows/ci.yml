name: CI/CD — Build, Push and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── CI Job — runs on GitHub-hosted runner ─────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -DskipTests -q

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:${{ github.sha }} \
            .

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:${{ github.sha }}

  # ── CD Job — runs on YOUR PC (self-hosted runner) ──────────
  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener:latest

      - name: Stop existing containers
        run: docker compose down

      - name: Start updated containers
        run: docker compose up -d --build

      - name: Verify deployment
        run: docker ps
